# Nixpacks configuration for Railway deployment
# This ensures Python 3.11 is available for JobSpy

[phases.setup]
nixPkgs = ["nodejs_20", "python311", "python311Packages.pip"]

[phases.install]
cmds = [
  "npm install -g pnpm",
  "pnpm install --frozen-lockfile",
  "pip install jobspy"
]

[phases.build]
cmds = ["pnpm run build"]

[start]
cmd = "node dist/index.js"
